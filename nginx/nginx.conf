events {}

http {
    # ── Rate limiting : 2 req/s par IP ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

    server {
        listen 80;

        # Resolver DNS interne Docker — résolution dynamique (évite le crash au démarrage)
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream http://api:80;

        # ── Porte interne : vérification quota/rôle ───────────────────────────
        location = /verify_admin {
            internal;
            proxy_pass             $api_upstream;
            proxy_pass_request_body off;
            proxy_set_header       Content-Length "";
            proxy_set_header       X-Original-URI $request_uri;
            proxy_set_header       X-API-Key $http_x_api_key;
        }

        # ── Route protégée : prédiction ───────────────────────────────────────
        location /predict {
            limit_req    zone=api_limit burst=5 nodelay;
            auth_request /verify_admin;

            proxy_pass       $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-API-Key $http_x_api_key;
        }

        # ── Toutes les autres routes ──────────────────────────────────────────
        location / {
            proxy_pass       $api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-API-Key $http_x_api_key;
        }
    }
}
